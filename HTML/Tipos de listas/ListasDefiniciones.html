<html>  
    <head>
        <title>Listas de definiciones</title>
    </head>

    <body>
    <!---dl contenedor de lista de definiciones, dt para término a definir, dd para definición del término--->
    primera lista

    <!--Múltiples términos/descripciones: Un solo <dt> puede tener varios <dd> asociados, o varios <dt> pueden compartir un mismo <dd>.
    Solo dentro de <dl>: Las etiquetas <dt> y <dd> solo deben existir dentro de un contenedor <dl>.-->
    
    <dl>
        <dt>Término 1</dt>
        <dd>Definición del término 1</dd>

        <dt>Término 2</dt>
        <dd>Definición del término 2</dd>

        <dt>Término 3</dt>
        <dd>Definición del término 3</dd>
    </dl>

    segunda lista

    <dl>
        <dt>Término A</dt>
        <dd>Definición del término A</dd>

        <dt>Término B</dt>
        <dd>Definición del término B</dd>

        <dt>Término C</dt>
        <dd>Definición del término C</dd>
    </dl>

    </body>
</html>
