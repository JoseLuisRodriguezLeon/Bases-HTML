<HTML> <!--#VIÑETA (debe cerrarse al final del documento)-->
    
    <HEAD> <!--#Viñeta para contenedor de metadatos (información sobre el documento) que no se visualizan directamente en la página web-->
    
        <TITLE>Ejemplo de Estructura HTML</TITLE> <!--# define el título oficial de la página web-->
    
    </HEAD>

    <BODY>
        
        <H1>Hola Mundo</H1> <!--#H1 para encabezado de mayor nivel  -->
        
        Prueba HTML
        
        <P>Este es un ejemplo de una estructura básica de un documento HTML.    </P> <!--#P para párrafo de texto -->
        <UL> <!--#UL para lista no ordenada -->
            <!--#LI para cada elemento de la lista -->
            <LI>Elemento 1</LI> 
            
            <LI>Elemento 2</LI>

            <LI>Elemento 3</LI>
        </UL>

    </BODY>

</HTML>
