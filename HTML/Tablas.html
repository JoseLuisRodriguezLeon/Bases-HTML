<html>  
    <head>
        <title>Tablas</title>
    </head>
    <body>

        <!-- borner necesario para el marco, tr fila, 
         td columna dentro fila, th  es para encabezados-->

        <table border="1" align = "center">
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Ciudad</th>
            </tr>
            <tr bgcolor="lightblue">
                <td>Ana</td>
                <td>28</td>
                <td>Madrid</td>
            </tr>
            <tr>
                <td>Carlos</td>
                <td>35</td>
                <td>Barcelona</td>
            </tr>
            <tr bgcolor="red">
                <td>Lucía</td>
                <td>22</td>
                <td>Valencia</td>
            </tr>
        </table>

        <!--#Representacion visual de lenguaje de codigo en HTML-->
        <p>Las tablas se definen utilizando la etiqueta <code>&lt;table&gt;</code>, con filas definidas por la etiqueta <code>&lt;tr&gt;</code>, encabezados por la etiqueta <code>&lt;th&gt;</code>, y celdas por la etiqueta <code>&lt;td&gt;</code>.</p>

    </body>



</html>
